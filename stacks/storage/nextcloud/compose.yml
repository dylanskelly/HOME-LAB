services:
  nextcloud-db:
    image: postgres:16-alpine
    container_name: ${NEXTCLOUD_DB_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    environment:
      POSTGRES_DB: ${NEXTCLOUD_DB_NAME}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/nextcloud_db_password
      TZ: ${TZ}
    volumes:
      - ${NEXTCLOUD_DATA_DIR}/db:/var/lib/postgresql/data
    secrets:
      - nextcloud_db_password
    networks:
      - nextcloud_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEXTCLOUD_DB_USER} -d ${NEXTCLOUD_DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5

  nextcloud-redis:
    image: redis:7-alpine
    container_name: ${NEXTCLOUD_REDIS_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    command: redis-server --appendonly yes
    volumes:
      - ${NEXTCLOUD_DATA_DIR}/redis:/data
    networks:
      - nextcloud_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  nextcloud:
    image: nextcloud:apache
    container_name: ${NEXTCLOUD_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    environment:
      TZ: ${TZ}

      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: ${NEXTCLOUD_DB_NAME}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/nextcloud_db_password

      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD_FILE: /run/secrets/nextcloud_admin_password

      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_HOST}
      OVERWRITEHOST: ${NEXTCLOUD_HOST}
      OVERWRITEPROTOCOL: https
      TRUSTED_PROXIES: traefik

      REDIS_HOST: nextcloud-redis

      PHP_MEMORY_LIMIT: 1024M
      PHP_UPLOAD_LIMIT: 10G
      APACHE_BODY_LIMIT: 0
    volumes:
      - ${NEXTCLOUD_DATA_DIR}/html:/var/www/html
      - ${NEXTCLOUD_DATA_DIR}/app:/var/www/html/data
      - ${NEXTCLOUD_LOGS_DIR}:/var/log/apache2
    secrets:
      - nextcloud_db_password
      - nextcloud_admin_password
    networks:
      - proxy
      - nextcloud_internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK}"
      - "traefik.http.routers.nextcloud.rule=Host(`${NEXTCLOUD_HOST}`)"
      - "traefik.http.routers.nextcloud.entrypoints=web"
      - "traefik.http.routers.nextcloud.service=nextcloud"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"

      # Nextcloud WebDAV redirects
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.regex=https://(.*)/.well-known/(card|cal)dav"
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.replacement=https://$${1}/remote.php/dav/"
      - "traefik.http.middlewares.nextcloud-dav.redirectregex.permanent=true"

      - "traefik.http.routers.nextcloud.middlewares=nextcloud-dav"

  nextcloud-cron:
    image: nextcloud:apache
    container_name: ${NEXTCLOUD_CRON_CONTAINER_NAME}
    restart: ${RESTART_POLICY}
    depends_on:
      - nextcloud
    entrypoint: /cron.sh
    volumes:
      - ${NEXTCLOUD_DATA_DIR}/html:/var/www/html
      - ${NEXTCLOUD_DATA_DIR}/app:/var/www/html/data
    networks:
      - nextcloud_internal

secrets:
  nextcloud_db_password:
    file: ${NEXTCLOUD_DB_PASSWORD_FILE}
  nextcloud_admin_password:
    file: ${NEXTCLOUD_ADMIN_PASSWORD_FILE}

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK}

  nextcloud_internal:
    name: nextcloud_internal
    internal: true
